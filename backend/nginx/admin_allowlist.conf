# IP-allowlist для /admin (admin-panel TSD §8, Ф4a — усиление доступа).
#
# Этот файл ПОДКЛЮЧАЕТСЯ через `include /etc/nginx/admin_allowlist.conf;`
# ВНУТРИ location-блоков /admin/ и /api/v1/admin/ в dev-proxy.conf. В DEV —
# намеренно `allow all;`, чтобы не ломать стенд (E2E/gate ходят с произвольных
# IP контейнеров/VM).
#
# ВАЖНО — почему монтируется в /etc/nginx/, а НЕ в /etc/nginx/conf.d/:
# базовый nginx.conf делает `include /etc/nginx/conf.d/*.conf;` на уровне http{}.
# Если положить этот файл в conf.d/, его allow/deny применятся ГЛОБАЛЬНО (http-
# уровень) и залочат ВЕСЬ сайт, а не только /admin. Поэтому файл лежит вне
# conf.d/ и подключается явным include только в admin-локейшены.
#
# ── Как включить в PROD ──────────────────────────────────────────────────
# Заменить `allow all;` на список доверенных IP/подсетей офиса/VPN, замкнув
# `deny all;`. Пример:
#
#     allow 203.0.113.10;        # офисный статический IP
#     allow 10.8.0.0/24;         # VPN-подсеть
#     deny all;                  # всё остальное — 403 на уровне nginx
#
# ВАЖНО (nginx за reverse-proxy): allow/deny сверяет $remote_addr — реальный IP
# клиента виден только если nginx — крайний. За внешним LB/CDN включить
# `real_ip` (ngx_http_realip_module: set_real_ip_from <lb-cidr>;
# real_ip_header X-Forwarded-For;), иначе allowlist будет матчить IP балансера.
#
# Правку делаем ТОЛЬКО здесь — основной dev-proxy.conf не трогаем при деплое.

allow all;
