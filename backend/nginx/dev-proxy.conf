# Dev/E2E reverse-proxy: один origin для фронта и API (B1-003).
#
# Зачем: auth-cookies выставлены SameSite=Lax + httpOnly. При cross-origin
# (фронт :8001 ↔ api :8000) браузер их НЕ прикрепит к fetch. Этот прокси
# отдаёт статику и API с ОДНОГО origin (http://localhost:8090), поэтому
# cookies работают и verify_signup_flow.py проходит.
#
#   /api/...  → uvicorn/gunicorn backend (контейнер `backend`)
#   /*        → статика фронта (repo root, смонтирован в /srv/www)

server {
    listen 80;
    server_name _;

    # ── Admin API — IP-allowlist (admin-panel TSD §8, Ф4a) ──────────────
    # Более специфичный location, чем /api/, поэтому матчится первым для
    # /api/v1/admin/*. admin_allowlist.conf: в dev — allow all; в prod —
    # реальные IP (правится только в том файле, см. комментарий внутри).
    location /api/v1/admin/ {
        include /etc/nginx/admin_allowlist.conf;
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Бэкенд API. location /api/ сохраняет полный путь (/api/v1/...).
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Cookies проходят как есть — same-origin, перезапись Domain не нужна.
        proxy_read_timeout 30s;
    }

    # Статика админки (/admin/*.html) — тот же IP-allowlist, что и admin API.
    location /admin/ {
        include /etc/nginx/admin_allowlist.conf;
        root /srv/www;
        try_files $uri $uri/ =404;
    }

    # Статика фронта (index.html, auth.html, assets/, config/, data/ …).
    location / {
        root /srv/www;
        index index.html;
        try_files $uri $uri/ =404;
    }
}
