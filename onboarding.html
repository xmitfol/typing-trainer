<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Знакомство — typing-trainer</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/tokens.css">
    <link rel="stylesheet" href="assets/css/onboarding-v2.css">
    <link rel="icon" type="image/x-icon" href="assets/images/favicon.ico">
</head>
<body>
    <!-- Onboarding Overlay v2 — содержимое генерируется assets/js/onboarding.js -->
    <div class="onboarding-v2 active" id="onboardingOverlay"></div>

    <!-- api-client + auth-sync ПЕРЕД router-guard: OAuth-landing (?oauth=1) включает
         серверный синк и подтягивает /me; router-guard читает флаг bootstrap. -->
    <script src="assets/js/api-client.js"></script>
    <script src="assets/js/auth-sync.js"></script>
    <!-- router-guard: если профиль уже готов → dashboard -->
    <script src="assets/js/router-guard.js"></script>
    <script src="config/settings.js"></script>
    <script src="assets/js/portraits.js"></script>
    <script src="assets/js/i18n.js"></script>
    <script src="assets/js/onboarding.js"></script>
    <script>
        // По завершении онбординга → личный кабинет.
        // При серверном синке (useApi=true, напр. после OAuth-регистрации) —
        // отправляем выбор наставника/аудитории/языка в аккаунт (PATCH /me) до
        // перехода. apiClient сам делает fallback на localStorage, если бэк недоступен.
        document.addEventListener('typingtrainer:onboardingComplete', function (e) {
            var p = (e && e.detail && e.detail.profile) || {};
            function go() { window.location.href = 'dashboard.html'; }
            var useApi = !!(window.apiClient && window.apiClient.getConfig().useApi);
            if (!useApi) { go(); return; }
            var patch = {
                name: p.name, audience: p.audience, character: p.character,
                gender: p.gender, language: p.language,
            };
            var done = false;
            function finish() { if (!done) { done = true; go(); } }
            window.apiClient.updateProfile(patch).then(finish, finish);
            setTimeout(finish, 2000);
        });
    </script>
</body>
</html>
