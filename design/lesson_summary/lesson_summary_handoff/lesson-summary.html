<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Отчёт по уроку — typing-trainer</title>
  <link rel="stylesheet" href="assets/css/tokens.css" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <style>
    body { padding: 40px 24px 80px; }
    .state-toggle {
      max-width: 760px; margin: 0 auto 20px; display: flex; gap: 8px; justify-content: center;
    }
    .state-toggle button {
      padding: 8px 18px; border-radius: 999px; border: 1px solid var(--divider);
      background: var(--surface); color: var(--sub); font-family: var(--font-ui);
      font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .state-toggle button[data-active="true"] { background: var(--ink); color: #fff; border-color: var(--ink); }

    .report-card {
      max-width: 760px; margin: 0 auto;
      background: var(--surface); border: 1px solid var(--divider);
      border-radius: var(--r-2xl); box-shadow: var(--shadow-lg);
      padding: 36px 40px 32px; position: relative; overflow: hidden;
    }

    .report-head { display: flex; align-items: center; gap: 22px; margin-bottom: 28px; }
    .report-avatar {
      width: 130px; height: 130px; border-radius: 50%;
      border: 3px solid; display: grid; place-items: center; overflow: hidden; flex-shrink: 0;
    }
    .report-kicker { font-family: var(--font-mono); font-size: 12px; color: var(--success); letter-spacing: 0.08em; font-weight: 700; margin-bottom: 6px; }
    .report-title { margin: 0; font-size: 40px; font-weight: 800; letter-spacing: -0.02em; }
    .report-subtitle { margin-top: 4px; font-size: 17px; color: var(--sub); }

    .report-block { margin-bottom: 26px; }
    .report-label { font-family: var(--font-mono); font-size: 10.5px; color: var(--faint); letter-spacing: 0.07em; margin-bottom: 10px; }

    .report-metrics { display: flex; gap: 28px; align-items: flex-end; padding: 20px 0; border-top: 1px solid var(--divider); border-bottom: 1px solid var(--divider); }
    .metric--primary .metric-val { font-size: 48px; }
    .metric-val { font-family: var(--font-mono); font-weight: 800; font-size: 30px; letter-spacing: -0.02em; line-height: 1; }
    .metric-val span { font-size: 14px; color: var(--faint); margin-left: 3px; }
    .metric-val--sm { font-size: 26px; color: var(--ink); }
    .metric-stars { display: flex; }

    .report-breakdown { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .breakdown-head { font-size: 13px; font-weight: 700; margin-bottom: 10px; }
    .breakdown-item { font-size: 14px; color: var(--ink); line-height: 1.5; padding: 4px 0; }

    .report-quote {
      border: 1px solid; border-radius: var(--r-lg); padding: 20px 24px; margin-bottom: 26px;
    }
    .report-quote__text { font-family: var(--font-serif); font-size: 19px; line-height: 1.45; color: var(--ink); font-style: italic; }
    .report-quote__by { font-size: 12.5px; color: var(--sub); margin-top: 10px; font-weight: 600; }

    .course-track { height: 8px; background: var(--divider); border-radius: 999px; overflow: hidden; }
    .course-fill { height: 100%; background: linear-gradient(90deg, var(--f-blue), var(--f-purple)); border-radius: 999px; }

    .report-actions { display: flex; gap: 10px; align-items: center; margin-top: 30px; }

    .confetti {
      position: absolute; inset: 0 0 auto 0; height: 6px;
      background: repeating-linear-gradient(90deg, var(--f-pink) 0 14px, var(--f-orange) 14px 28px, var(--f-green) 28px 42px, var(--f-blue) 42px 56px, var(--f-purple) 56px 70px);
    }
  </style>
</head>
<body>
  <div class="state-toggle">
    <button data-state="success" data-active="true">Состояние: успех</button>
    <button data-state="struggle">Состояние: с трудом</button>
  </div>
  <div id="report"></div>

  <script src="assets/js/portraits.js"></script>
  <script src="assets/js/lesson-summary.js"></script>
</body>
</html>
